services:
  next:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./next:/app
    ports:
      - "3000:3000"
    # Instaluje paczki, a potem uruchamia serwer z flagą --host
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - NEXT_PUBLIC_WS_URL=/api/ws