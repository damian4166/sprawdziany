services:
  next:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./next:/app
    ports:
      - "3000:3000"
    # Instaluje paczki, a potem uruchamia serwer z flagą --host
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - NEXT_PUBLIC_WS_URL=/api/ws
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_FROM=sprawdziany@example.com
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true