services:
  next:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./:/app
    #ports:
    #  - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gra-frontend.rule=Host(`sprawdziany.vps.malejka.lowicz.pl`)"
      - "traefik.http.routers.gra-frontend.entrypoints=websecure"
      - "traefik.http.routers.gra-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.gra-frontend-service.loadbalancer.server.port=3000"  
    networks:
      - proxy